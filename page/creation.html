<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un poème - Vers en Lumière</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Styles spécifiques à la page de création */
        .create-hero {
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 3rem 2rem;
            background: radial-gradient(circle at center, rgba(255,214,231,0.1) 0%, transparent 70%);
            animation: fadeIn 1s ease-out;
        }

        .create-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            background: linear-gradient(45deg, #ffd6e7, #e6b3ff, #b3ecff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .create-hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
        }

        .create-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .create-form {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 3rem;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInUp 1s ease-out;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            color: #ffd6e7;
        }

        .form-group label i {
            margin-right: 0.5rem;
        }

        #poem-title-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.3rem;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: #f0e6f6;
            font-family: 'Playfair Display', serif;
            transition: all 0.3s ease;
        }

        #poem-title-input:focus {
            outline: none;
            border-color: #ffd6e7;
            box-shadow: 0 0 20px rgba(255,214,231,0.3);
        }

        #poem-title-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        #poem-content {
            width: 100%;
            min-height: 350px;
            padding: 2rem;
            font-size: 1.3rem;
            line-height: 1.8;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            color: #f0e6f6;
            font-family: 'Cormorant Garamond', serif;
            resize: vertical;
            transition: all 0.3s ease;
        }

        #poem-content:focus {
            outline: none;
            box-shadow: 0 0 30px rgba(255,214,231,0.3);
            border-color: #ffd6e7;
        }

        #poem-content::placeholder {
            color: rgba(255,255,255,0.4);
            font-style: italic;
        }

        .form-actions {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn.primary {
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            box-shadow: 0 10px 30px rgba(255,107,157,0.4);
        }

        .btn.primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255,107,157,0.6);
        }

        .btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #f0e6f6;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn.secondary:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }

        /* Prévisualisation */
        .preview-section {
            margin-top: 3rem;
            animation: fadeInUp 1s ease-out;
        }

        .preview-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: #e6b3ff;
        }

        .preview-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 3rem;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .preview-card::before {
            content: '"';
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 8rem;
            color: rgba(255,214,231,0.1);
            font-family: 'Playfair Display', serif;
        }

        .preview-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #ffd6e7;
            margin-bottom: 0.5rem;
        }

        .preview-card .preview-date {
            color: #b3ecff;
            font-style: italic;
            margin-bottom: 2rem;
        }

        .preview-card .preview-text {
            font-size: 1.3rem;
            line-height: 2;
            white-space: pre-wrap;
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Message de succès */
        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            z-index: 1000;
            animation: slideIn 0.5s ease-out, fadeOut 0.5s ease-out 2.5s forwards;
            box-shadow: 0 10px 30px rgba(255,107,157,0.4);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .create-form {
                padding: 2rem 1rem;
            }
            
            .form-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <i class="fas fa-feather-alt"></i>
                <span>Vers en Lumière</span>
            </a>
            <button class="nav-toggle" onclick="toggleNav()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="../index.html" class="nav-link">Accueil</a>
                <a href="creation.html" class="nav-link active">Créer un poème</a>
                <a href="vos-creations.html" class="nav-link">Vos créations</a>
                <a href="auteurs.html" class="nav-link">Auteurs & Œuvres</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="create-hero">
        <h1>Créez votre poème</h1>
        <p>Laissez votre plume danser sur le papier numérique. Chaque mot est une étincelle de lumière.</p>
    </section>

    <!-- Formulaire de création -->
    <section class="create-container">
        <form id="poem-form" class="create-form">
            <div class="form-group">
                <label for="poem-title-input"><i class="fas fa-heading"></i> Titre de votre poème</label>
                <input type="text" id="poem-title-input" placeholder="Entrez le titre de votre chef-d'œuvre..." required>
            </div>
            
            <div class="form-group">
                <label for="poem-content"><i class="fas fa-pen-fancy"></i> Vos vers</label>
                <textarea id="poem-content" placeholder="Écrivez ici les vers de votre âme...

La poésie est le journal d'un animal marin qui vit sur terre et qui voudrait voler." required></textarea>
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn secondary" onclick="previewPoem()">
                    <i class="fas fa-eye"></i> Prévisualiser
                </button>
                <button type="submit" class="btn primary">
                    <i class="fas fa-save"></i> Sauvegarder
                </button>
            </div>
        </form>

        <!-- Section de prévisualisation -->
        <div class="preview-section" id="previewSection" style="display: none;">
            <h2 class="preview-title"><i class="fas fa-magic"></i> Prévisualisation</h2>
            <div class="preview-card">
                <h3 id="preview-title">Titre du poème</h3>
                <p class="preview-date" id="preview-date"></p>
                <div class="preview-text" id="preview-text"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p><i class="fas fa-heart"></i> Vers en Lumière - Où chaque mot trouve sa lumière</p>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        // Prévisualisation du poème
        function previewPoem() {
            const title = document.getElementById('poem-title-input').value || 'Sans titre';
            const content = document.getElementById('poem-content').value;
            
            if (!content.trim()) {
                showMessage('Veuillez écrire quelques vers avant de prévisualiser.', 'warning');
                return;
            }

            document.getElementById('preview-title').textContent = title;
            document.getElementById('preview-date').textContent = new Date().toLocaleDateString('fr-FR', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('preview-text').textContent = content;
            
            const previewSection = document.getElementById('previewSection');
            previewSection.style.display = 'block';
            previewSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // Animation d'entrée
            previewSection.style.opacity = '0';
            previewSection.style.transform = 'translateY(30px)';
            setTimeout(() => {
                previewSection.style.transition = 'all 0.6s ease';
                previewSection.style.opacity = '1';
                previewSection.style.transform = 'translateY(0)';
            }, 100);
        }

        // Sauvegarde du poème
        document.getElementById('poem-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('poem-title-input').value;
            const content = document.getElementById('poem-content').value;
            
            const poem = {
                title: title,
                content: content,
                date: new Date().toLocaleDateString('fr-FR', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                }),
                timestamp: Date.now()
            };
            
            savePoem(poem);
            
            // Reset form
            this.reset();
            document.getElementById('previewSection').style.display = 'none';
            
            // Message de succès
            showMessage('Poème sauvegardé avec succès ! ✨', 'success');
        });

        // Fonction de sauvegarde
        function savePoem(poem) {
            let savedPoems = JSON.parse(localStorage.getItem('versEnLumierePoems')) || [];
            savedPoems.unshift(poem);
            localStorage.setItem('versEnLumierePoems', JSON.stringify(savedPoems));
        }

        // Afficher un message
        function showMessage(text, type) {
            const existing = document.querySelector('.success-message');
            if (existing) existing.remove();
            
            const message = document.createElement('div');
            message.className = 'success-message';
            message.textContent = text;
            
            if (type === 'warning') {
                message.style.background = 'linear-gradient(45deg, #ffa726, #ff7043)';
            }
            
            document.body.appendChild(message);
            setTimeout(() => message.remove(), 3000);
        }

        // Animation d'entrée du formulaire
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('.create-form');
            form.style.opacity = '0';
            form.style.transform = 'translateY(30px)';
            
            setTimeout(() => {
                form.style.transition = 'all 0.8s ease';
                form.style.opacity = '1';
                form.style.transform = 'translateY(0)';
            }, 200);
        });
    </script>
</body>
</html>
